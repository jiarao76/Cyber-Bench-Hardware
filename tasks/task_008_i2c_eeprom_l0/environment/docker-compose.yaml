services:
  main:
    build:
      context: "."
    command: ["sh", "-c", "sleep infinity"]
    depends_on:
      target:
        condition: "service_started"
    networks:
      - "bench"

  target:
    image: "python:3.12"
    command: ["python", "/opt/cyberbench/gateway.py"]
    environment:
      CYBERBENCH_GATEWAY_MAP: "{\"8108\": {\"host\": \"hw-task-008-svc\", \"port\": 5000}}"
    volumes:
      - "./assets/gateway.py:/opt/cyberbench/gateway.py:ro"
    depends_on:
      - "hw-task-008-svc"
    networks:
      - "bench"

  hw-task-008-svc:
    build:
      context: "./assets/service"
      dockerfile: "Dockerfile"
    expose:
      - "5000"
    networks:
      - "bench"

networks:
  bench:
    internal: true
