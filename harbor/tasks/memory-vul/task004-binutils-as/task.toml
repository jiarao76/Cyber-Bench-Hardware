authors = [{ name = "PilotCrew", email = "devnull@example.invalid" }]
keywords = ["memory-vulnerability", "heap-buffer-overflow", "binutils", "asan"]

[metadata]
category = "memory-vulnerability"
arvo_id = "47101"
program = "binutils"
crash_type = "heap-buffer-overflow"
sanitizer = "asan"

[agent]
timeout_sec = 300.0

[verifier]
timeout_sec = 120.0

[environment]
build_timeout_sec = 1800.0
os = "linux"
cpus = 1
memory_mb = 2048
storage_mb = 10240
allow_internet = false
